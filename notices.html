<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>সকল নোটিশ | মাদরাসায়ে নূরুল কুরআন</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
    background:#f5f7fb;
    font-family:Arial,sans-serif;
}

.notice-header{
    background:#198754;
    color:#fff;
    padding:60px 0;
}

.notice-header h1{
    font-weight:700;
}

.notice-card{
    transition:.3s;
}

.notice-card:hover{
    transform:translateY(-5px);
}

.notice-img{
    height:220px;
    object-fit:cover;
}

.badge{
    font-size:14px;
}

</style>

</head>

<body>

<!-- Header -->

<section class="notice-header">

<div class="container">

<h1>
📢 সকল নোটিশ
</h1>

<p class="mb-4">
মাদরাসায়ে নূরুল কুরআনের সকল বিজ্ঞপ্তি
</p>

<a href="index.html" class="btn btn-light">

<i class="fa-solid fa-house"></i>

হোমে ফিরে যান

</a>

</div>

</section>

<!-- Search -->

<section class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-6">

<input
type="text"
id="searchNotice"
class="form-control form-control-lg"
placeholder="🔍 নোটিশ খুঁজুন...">

</div>

</div>

</section>

<!-- Notice Board -->

<section class="container py-5">

<div
id="noticeContainer"
class="row g-4">

<div class="col-12 text-center">

<div class="spinner-border text-success"></div>

<p class="mt-3">

নোটিশ লোড হচ্ছে...

</p>

</div>

</div>

</section>

<footer class="bg-success text-white text-center py-4">

© 2026 মাদরাসায়ে নূরুল কুরআন | All Rights Reserved

</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="assets/supabase.js"></script>

<script src="assets/notices.js"></script>

</body>

</html>
