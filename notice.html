<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Notice Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body class="bg-light">

<div class="container py-5">

<h2 class="mb-4">

📢 Notice Management

</h2>

<div class="card shadow">

<div class="card-body">

<form id="noticeForm">

    <!-- Notice Title -->
    <div class="mb-3">
        <label class="form-label fw-bold">
            Notice Title
        </label>

        <input
            type="text"
            id="title"
            class="form-control"
            placeholder="Notice Title"
            required>
    </div>

    <!-- Description -->
    <div class="mb-3">
        <label class="form-label fw-bold">
            Description
        </label>

        <textarea
            id="description"
            class="form-control"
            rows="5"
            placeholder="Write Notice..."
            required></textarea>
    </div>

    <!-- Notice Image -->
    <div class="mb-3">
        <label class="form-label fw-bold">
            Notice Image
        </label>

        <input
            type="file"
            id="noticeImage"
            class="form-control"
            accept="image/*">
    </div>

    <!-- PDF Upload -->
    <div class="mb-3">
        <label class="form-label fw-bold">
            PDF File
        </label>

        <input
            type="file"
            id="noticePDF"
            class="form-control"
            accept=".pdf">
    </div>

    <!-- Important -->
    <div class="form-check mb-2">

        <input
            class="form-check-input"
            type="checkbox"
            id="important">

        <label
            class="form-check-label"
            for="important">

            ⭐ Important Notice

        </label>

    </div>

    <!-- Pin -->
    <div class="form-check mb-4">

        <input
            class="form-check-input"
            type="checkbox"
            id="pinned">

        <label
            class="form-check-label"
            for="pinned">

            📌 Pin this Notice

        </label>

    </div>

    <!-- Button -->
    <button
        type="submit"
        class="btn btn-success w-100">

        <i class="fa-solid fa-paper-plane"></i>

        Publish Notice

    </button>

</form>

</div>

</div>

<hr>

<h3>সকল নোটিশ</h3>

<table class="table table-bordered mt-3">

<thead class="table-success">

<tr>

<th>ID</th>

<th>Title</th>

<th>Description</th>

</tr>

</thead>

<tbody id="noticeTable">

</tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="assets/supabase.js"></script>

<script src="assets/notice.js"></script>

</body>

</html>
