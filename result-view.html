<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
background:#f5f5f5;
}

.card{
border-radius:15px;
}

table td,table th{
vertical-align:middle;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="card shadow">

<div class="card-header bg-success text-white text-center">

<h2>

🕌 মাদরাসায়ে নূরুল কুরআন

</h2>

<h5>

Student Result

</h5>

</div>

<div class="card-body">

<div class="row mb-4">

<div class="col-md-4">

<b>Student Name :</b>

<span id="student_name"></span>

</div>

<div class="col-md-4">

<b>Roll :</b>

<span id="roll"></span>

</div>

<div class="col-md-4">

<b>Class :</b>

<span id="class"></span>

</div>

</div>

<table class="table table-bordered">

<thead class="table-success">

<tr>

<th>Subject</th>

<th>Marks</th>

</tr>

</thead>

<tbody>

<tr>

<td>বাংলা</td>

<td id="bangla"></td>

</tr>

<tr>

<td>ইংরেজি</td>

<td id="english"></td>

</tr>

<tr>

<td>গণিত</td>

<td id="math"></td>

</tr>

<tr>

<td>আরবি</td>

<td id="arabic"></td>

</tr>

<tr>

<td>কুরআন</td>

<td id="quran"></td>

</tr>

<tr class="table-warning">

<th>Total</th>

<th id="total"></th>

</tr>

<tr class="table-info">

<th>GPA</th>

<th id="gpa"></th>

</tr>

<tr class="table-primary">

<th>Grade</th>

<th id="grade"></th>

</tr>

</tbody>

</table>

<div class="text-center mt-4">

<button
class="btn btn-success"
onclick="window.print()">

<i class="fa-solid fa-print"></i>

Print

</button>

<a
href="admin-result.html"
class="btn btn-secondary">

Back

</a>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="assets/supabase.js"></script>

<script src="assets/result-view.js"></script>

</body>
</html>
