<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Notice Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
background:#f5f7fb;
}

.card{
border:none;
border-radius:15px;
}

.table img{
border-radius:8px;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>

📢 Notice Management

</h2>

<a href="admin.html"
class="btn btn-secondary">

Dashboard

</a>

</div>

<div class="card shadow">

<div class="card-body">

<form id="noticeForm">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Notice Title

</label>

<input
type="text"
id="title"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Category

</label>

<select
id="category"
class="form-select">

<option value="সাধারণ">📢 সাধারণ</option>

<option value="ভর্তি">📚 ভর্তি</option>

<option value="পরীক্ষা">📝 পরীক্ষা</option>

<option value="অনুষ্ঠান">🎉 অনুষ্ঠান</option>

<option value="জরুরি">🚨 জরুরি</option>

</select>

</div>

</div>

<div class="mb-3">

<label>

Description

</label>

<textarea
id="description"
class="form-control"
rows="5"
required></textarea>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>

Notice Image

</label>

<input
type="file"
id="noticeImage"
class="form-control"
accept="image/*">

</div>

<div class="col-md-6 mb-3">

<label>

PDF File

</label>

<input
type="file"
id="noticePDF"
class="form-control"
accept=".pdf">

</div>

</div>

<div class="form-check">

<input
type="checkbox"
id="important"
class="form-check-input">

<label
class="form-check-label">

⭐ Important

</label>

</div>

<div class="form-check mb-4">

<input
type="checkbox"
id="pinned"
class="form-check-input">

<label
class="form-check-label">

📌 Pin Notice

</label>

</div>

<button
id="submitBtn"
class="btn btn-success w-100">

<i class="fa-solid fa-paper-plane"></i>

Publish Notice

</button>

</form>

</div>

</div>

<hr class="my-5">

<input
type="text"
id="searchNotice"
class="form-control mb-3"
placeholder="🔍 Search Notice...">

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead class="table-success">

<tr>

<th>ID</th>

<th>Title</th>

<th>Category</th>

<th>Image</th>

<th>PDF</th>

<th>Action</th>

</tr>

</thead>

<tbody id="noticeTable">

<tr>

<td colspan="6"
class="text-center">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="assets/supabase.js"></script>

<script src="assets/notice.js"></script>

</body>

</html>
