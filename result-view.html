<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Result | মাদরাসায়ে নূরুল কুরআন</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
background:#f1f5f9;
font-family:Arial,sans-serif;
}

.result-card{
max-width:900px;
margin:auto;
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.header{
background:#198754;
color:#fff;
text-align:center;
padding:30px;
}

.header img{
width:90px;
height:90px;
object-fit:contain;
margin-bottom:10px;
}

.header h2{
font-weight:bold;
margin:0;
}

.header p{
margin:5px 0;
}

.info-table td{
padding:10px;
}

.subject-table th,
.subject-table td{
text-align:center;
vertical-align:middle;
}

.footer{
margin-top:60px;
}

.signature{
text-align:center;
}

.signature hr{
border:1px solid #000;
opacity:1;
margin-bottom:8px;
}

.action-buttons{
text-align:center;
margin-top:30px;
}

@media print{

.action-buttons{
display:none;
}

body{
background:#fff;
}

.result-card{
box-shadow:none;
}

}

</style>

</head>

<body>

<div class="container py-5">

<div class="result-card" id="resultCard">

<div class="header">

<img src="assets/images/logo.png">

<h2>মাদরাসায়ে নূরুল কুরআন</h2>

<p>ভল্লভপুর, দিঘলী, চন্দ্রগঞ্জ, লক্ষ্মীপুর</p>

<h4 class="mt-3">

Academic Result Sheet

</h4>

</div>

<div class="p-4">

<div class="row">

<div class="col-md-3 text-center">

<img
src="assets/images/student.png"
id="studentPhoto"
class="img-thumbnail"
width="150">

</div>

<div class="col-md-9">

<table class="table table-bordered info-table">

<tr>

<th width="200">

Student Name

</th>

<td id="student_name"></td>

</tr>

<tr>

<th>

Roll

</th>

<td id="roll"></td>

</tr>

<tr>

<th>

Class

</th>

<td id="class"></td>

</tr>

<tr>

<th>

Session

</th>

<td>

2026

</td>

</tr>

</table>

</div>

</div>

<hr>

<table class="table table-bordered subject-table">

<thead class="table-success">

<tr>

<th>Subject</th>

<th>Marks</th>

</tr>

</thead>

<tbody>

<tr>

<td>বাংলা</td>

<td id="bangla"></td>

</tr>

<tr>

<td>ইংরেজি</td>

<td id="english"></td>

</tr>

<tr>

<td>গণিত</td>

<td id="math"></td>

</tr>

<tr>

<td>আরবি</td>

<td id="arabic"></td>

</tr>

<tr>

<td>কুরআন</td>

<td id="quran"></td>

</tr>

<tr class="table-warning">

<th>Total</th>

<th id="total"></th>

</tr>

<tr class="table-info">

<th>GPA</th>

<th id="gpa"></th>

</tr>

<tr class="table-primary">

<th>Grade</th>

<th id="grade"></th>

</tr> 
<tr class="table-success">

<th>Result</th>

<th id="status">Pass</th>

</tr>

</tbody>

</table>

<div class="row footer">

<div class="col-6 signature">

<hr>

<p>

Class Teacher

</p>

</div>

<div class="col-6 signature">

<hr>

<p>

Principal

</p>

</div>

</div>

<div class="action-buttons">

<button
class="btn btn-success me-2"
onclick="window.print()">

<i class="fa-solid fa-print"></i>

Print

</button>

<button
class="btn btn-danger me-2"
onclick="downloadPDF()">

<i class="fa-solid fa-file-pdf"></i>

Download PDF

</button>

<a
href="admin-result.html"
class="btn btn-secondary">

<i class="fa-solid fa-arrow-left"></i>

Back

</a>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="assets/supabase.js"></script>

<script src="assets/result-view.js"></script>
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>

</html>
