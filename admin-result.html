<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Result Management | মাদরাসায়ে নূরুল কুরআন</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success shadow">

<div class="container">

<a class="navbar-brand fw-bold" href="admin.html">

🕌 Result Management

</a>

<a href="admin.html" class="btn btn-light">

<i class="fa-solid fa-arrow-left"></i>

Dashboard

</a>

</div>

</nav>

<div class="container py-5">

<!-- Add Result -->

<div class="card shadow mb-5">

<div class="card-header bg-success text-white">

<h3 class="mb-0">

➕ নতুন ফলাফল যোগ করুন

</h3>

</div>

<div class="card-body">

<form id="resultForm">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">শিক্ষার্থীর নাম</label>

<input
type="text"
id="student_name"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">রোল</label>

<input
type="text"
id="roll"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">শ্রেণী</label>

<input
type="text"
id="class"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">বাংলা</label>

<input
type="number"
id="bangla"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">ইংরেজি</label>

<input
type="number"
id="english"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">গণিত</label>

<input
type="number"
id="math"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">আরবি</label>

<input
type="number"
id="arabic"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">কুরআন</label>

<input
type="number"
id="quran"
class="form-control"
required>

</div>

<div class="col-12">

<button type="submit" class="btn btn-success">

<i class="fa-solid fa-floppy-disk"></i>

Result Save

</button>

</div>

</div>

</form>

</div>

</div>

<!-- Result List -->

<div class="card shadow">

<div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

<h3 class="mb-0">

📋 Result List

</h3>

<span class="badge bg-light text-dark fs-6">

মোট ফলাফল:
<span id="resultCount">0</span>

</span>

</div>

<div class="card-body">

<div class="row mb-3">

<div class="col-md-6">

<input
type="text"
id="searchRoll"
class="form-control"
placeholder="🔍 Roll অথবা নাম দিয়ে খুঁজুন">

</div>

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover table-striped align-middle">

<thead class="table-success">

<tr>

<th>ID</th>

<th>Name</th>

<th>Roll</th>

<th>Class</th>

<th>Total</th>

<th>GPA</th>

<th>Grade</th>

<th>Action</th>

</tr>

</thead>

<tbody id="resultTable">

<tr>

<td colspan="8" class="text-center">

নোটিশ লোড হচ্ছে...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>


 <!-- Edit Result Modal -->
<div class="modal fade" id="editModal" tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header bg-primary text-white">

<h5 class="modal-title">

✏️ Result Edit

</h5>

<button
type="button"
class="btn-close btn-close-white"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body">

<input type="hidden" id="edit_id">

<div class="mb-3">

<label>Student Name</label>

<input
type="text"
id="edit_student_name"
class="form-control">

</div>

<div class="mb-3">

<label>Roll</label>

<input
type="text"
id="edit_roll"
class="form-control">

</div>

<div class="mb-3">

<label>Class</label>

<input
type="text"
id="edit_class"
class="form-control">

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Bangla</label>

<input
type="number"
id="edit_bangla"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>English</label>

<input
type="number"
id="edit_english"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Math</label>

<input
type="number"
id="edit_math"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Arabic</label>

<input
type="number"
id="edit_arabic"
class="form-control">

</div>

<div class="col-md-12 mb-3">

<label>Quran</label>

<input
type="number"
id="edit_quran"
class="form-control">

</div>

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancel

</button>

<button
class="btn btn-success"
onclick="updateResult()">

Update

</button>

</div>

</div>

</div>

</div> 
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="assets/supabase.js"></script>

<script src="assets/admin-result.js"></script>

</body>

</html>
