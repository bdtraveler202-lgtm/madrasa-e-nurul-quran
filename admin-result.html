<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Result Management | মাদরাসায়ে নূরুল কুরআন</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success">

<div class="container">

<a class="navbar-brand fw-bold" href="admin.html">

🕌 Result Management

</a>

<a href="admin.html" class="btn btn-light">

<i class="fa-solid fa-arrow-left"></i>

Dashboard

</a>

</div>

</nav>

<div class="container py-5">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3 class="mb-0">

➕ নতুন ফলাফল যোগ করুন

</h3>

</div>

<div class="card-body">

<form id="resultForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>শিক্ষার্থীর নাম</label>

<input
type="text"
id="student_name"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>রোল</label>

<input
type="text"
id="roll"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>শ্রেণী</label>

<input
type="text"
id="class"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>বাংলা</label>

<input
type="number"
id="bangla"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>ইংরেজি</label>

<input
type="number"
id="english"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>গণিত</label>

<input
type="number"
id="math"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>আরবি</label>

<input
type="number"
id="arabic"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>কুরআন</label>

<input
type="number"
id="quran"
class="form-control"
required>

</div>

<div class="col-12">

<button class="btn btn-success">

<i class="fa-solid fa-floppy-disk"></i>

Result Save

</button>

</div>

</div>

</form>

</div>

</div>

<hr class="my-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3 class="mb-0">

📋 Result List

</h3>

</div>

<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead class="table-success">

<tr>

<th>ID</th>

<th>Name</th>

<th>Roll</th>

<th>Class</th>

<th>Total</th>

<th>GPA</th>

<th>Grade</th>

<th>Action</th>

</tr>

</thead>

<tbody id="resultTable">

<tr>

<td colspan="8" class="text-center">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="assets/supabase.js"></script>

<script src="assets/admin-result.js"></script>

</body>
</html>
