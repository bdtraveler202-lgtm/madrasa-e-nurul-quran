<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>সকল নোটিশ | মাদরাসায়ে নূরুল কুরআন</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
background:#f4f7fb;
}

.notice-header{
background:#198754;
color:#fff;
padding:50px 0;
}

.notice-card{
transition:.3s;
border:none;
border-radius:15px;
overflow:hidden;
}

.notice-card:hover{
transform:translateY(-6px);
}

.notice-img{
height:220px;
object-fit:cover;
}

.badge{
font-size:13px;
}

</style>

</head>

<body>

<section class="notice-header">

<div class="container text-center">

<h1 class="fw-bold">

📢 সকল নোটিশ

</h1>

<p>

মাদরাসায়ে নূরুল কুরআনের সর্বশেষ নোটিশসমূহ

</p>

<a href="index.html"
class="btn btn-light">

<i class="fa-solid fa-house"></i>

হোমে ফিরে যান

</a>

</div>

</section>

<div class="container py-5">

<div class="row mb-4">

<div class="col-md-6">

<input
type="text"
id="searchNotice"
class="form-control"
placeholder="🔍 নোটিশ খুঁজুন...">

</div>

<div class="col-md-6">

<select
id="categoryFilter"
class="form-select">

<option value="">

সব Category

</option>

<option value="সাধারণ">

📢 সাধারণ

</option>

<option value="ভর্তি">

📚 ভর্তি

</option>

<option value="পরীক্ষা">

📝 পরীক্ষা

</option>

<option value="অনুষ্ঠান">

🎉 অনুষ্ঠান

</option>

<option value="জরুরি">

🚨 জরুরি

</option>

</select>

</div>

</div>

<div
id="noticeContainer"
class="row g-4">

<div class="col-12 text-center py-5">

<div class="spinner-border text-success"></div>

<p class="mt-3">

নোটিশ লোড হচ্ছে...

</p>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="assets/supabase.js"></script>

<script src="assets/notices.js"></script>

</body>
</html>
